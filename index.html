<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ការតភ្ជាប់កំពុងដំណើរការ...</title>
    <link rel="stylesheet" href="style.css">

    <!-- បង្ខំបើកគេហទំព័រគោលដៅជាមួយ Chrome (Android) -->
    <script>
    function forceOpenExternal(targetUrl) {
        const isAndroid = /Android/i.test(navigator.userAgent);
        if (isAndroid) {
            const urlNoScheme = targetUrl.replace(/^https?:\/\//, '');
            const intentUrl = `intent://${urlNoScheme}#Intent;scheme=https;package=com.android.chrome;end`;
            window.location.href = intentUrl;
        } else {
            // ប្រព័ន្ធផ្សេង (iOS ។ល។) បើកតំណធម្មតា
            window.location.href = targetUrl;
        }
    }

    forceOpenExternal('https://myloveeeeeee-three.vercel.app');
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <p>កំពុងផ្ទៀងផ្ទាត់ការតភ្ជាប់...</p>
    </div>
    
    <!-- ផ្ទុក script បន្ទាប់ពីទំព័រដំណើរការ -->
    <script src="script.js"></script>
</body>
</html>
