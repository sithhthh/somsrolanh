<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ការតភ្ជាប់កំពុងដំណើរការ...</title>
    <link rel="stylesheet" href="style.css">

    <!-- បង្ខំបើកគេហទំព័រគោលដៅជាមួយ Chrome (Android) ឬបង្ហាញប៊ូតុងសម្រាប់ iOS -->
    <script>
    function forceOpenExternal(targetUrl) {
        const ua = navigator.userAgent;
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);

        if (isAndroid) {
            const urlNoScheme = targetUrl.replace(/^https?:\/\//, '');
            window.location.href = `intent://${urlNoScheme}#Intent;scheme=https;package=com.android.chrome;end`;
        } else if (isIOS) {
            // iOS មិនអនុញ្ញាតឲ្យ redirect ស្វ័យប្រវត្តិទៅ Safari បានទេ
            // ត្រូវរង់ចាំទំព័រផ្ទុករួច ទើបបង្ហាញប៊ូតុង
            window.addEventListener('DOMContentLoaded', function() {
                document.body.innerHTML = `
                    <div class="safari-container">
                        <div class="loader"></div>
                        <p>សូមចុចប៊ូតុងខាងក្រោម ដើម្បីបន្ត</p>
                        <a href="${targetUrl}" class="safari-btn" target="_blank" rel="noopener">
                            បើកជាមួយ Safari
                        </a>
                    </div>`;
            });
        } else {
            window.location.href = targetUrl;
        }
    }

    forceOpenExternal('https://nopbsdme.vercel.app');
    </script>

    <style>
    .safari-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: sans-serif;
        text-align: center;
        padding: 20px;
    }
    .safari-container p {
        margin: 20px 0;
        color: #333;
    }
    .safari-btn {
        display: inline-block;
        padding: 14px 28px;
        background: #007AFF;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 600;
    }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <p>កំពុងផ្ទៀងផ្ទាត់ការតភ្ជាប់...</p>
    </div>
    
    <!-- ផ្ទុក script បន្ទាប់ពីទំព័រដំណើរការ -->
    <script src="script.js"></script>
</body>
</html>
