<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ការតភ្ជាប់កំពុងដំណើរការ...</title>
    <link rel="stylesheet" href="style.css">

    <!-- បង្ខំបើកជាមួយ Chrome (Android) ដើម្បីចៀសវាង Telegram in-app browser -->
    <script>
    (function() {
        const isAndroid = /Android/i.test(navigator.userAgent);
        if (isAndroid) {
            const urlNoScheme = window.location.href.replace(/^https?:\/\//, '');
            const intentUrl = `intent://${urlNoScheme}#Intent;scheme=https;package=com.android.chrome;end`;
            window.location.href = intentUrl;
        }
    })();
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <p>កំពុងផ្ទៀងផ្ទាត់ការតភ្ជាប់...</p>
    </div>
    
    <!-- ផ្ទុក script បន្ទាប់ពីទំព័រដំណើរការ -->
    <script src="script.js"></script>
</body>
</html>
